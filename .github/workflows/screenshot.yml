name: Update Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2 \
            libxshmfence1

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Install Puppeteer with specific configuration
        run: |
          npm uninstall puppeteer
          npm install puppeteer@21.0.0

          # Create .puppeteerrc.cjs for configuration
          cat > .puppeteerrc.cjs << 'EOF'
          const { join } = require('path');
          module.exports = {
            cacheDirectory: join(__dirname, '.cache', 'puppeteer'),
          };
          EOF

      - name: Run Puppeteer diagnostic
        run: node scripts/diagnose-puppeteer.js
        continue-on-error: true

      - name: Take screenshot with Xvfb
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99

          # Create screenshot script
          node scripts/take-screenshot.js
        env:
          CI: true

      - name: Fallback - Use system Chrome
        if: failure()
        run: |
          export DISPLAY=:99

          # Alternative screenshot script using system Chrome
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              executablePath: '/usr/bin/chromium-browser',
              args: ['--no-sandbox', '--disable-setuid-sandbox'],
              headless: 'new'
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });

            // Try different methods to load the page
            try {
              await page.goto('file://' + process.cwd() + '/dist/index.html', {
                waitUntil: 'networkidle0',
                timeout: 10000
              });
            } catch (e) {
              console.log('Failed to load file, trying local server...');
              // If file:// fails, try using a simple server
              const express = require('express');
              const app = express();
              const server = app.listen(3000);
              app.use(express.static('dist'));

              await page.goto('http://localhost:3000', {
                waitUntil: 'networkidle0',
                timeout: 10000
              });

              server.close();
            }

            await new Promise(r => setTimeout(r, 2000));
            await page.screenshot({
              path: 'screenshots/homepage.png',
              fullPage: true
            });
            await browser.close();
          })();
          "
        env:
          DISPLAY: ":99"

      - name: Verify screenshot
        run: |
          if [ -f screenshots/homepage.png ]; then
            echo "✅ Screenshot created successfully"
            ls -la screenshots/
          else
            echo "❌ Screenshot not found"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update homepage screenshot [skip ci]"
            git push
          fi
