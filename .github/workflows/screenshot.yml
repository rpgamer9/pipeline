name: Update Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install express puppeteer --save-dev

      - name: Build the app
        run: npm run build

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2 \
            libxshmfence1 \
            fonts-liberation \
            libappindicator3-1

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Take screenshot with Xvfb
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99

          # Take screenshot
          node scripts/take-screenshot.js
        env:
          CI: true

      - name: Verify screenshot
        run: |
          if [ -f screenshots/homepage.png ]; then
            echo "✅ Screenshot created successfully"
            ls -la screenshots/
          else
            echo "❌ Screenshot not found"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update homepage screenshot [skip ci]"
            git push
          fi
