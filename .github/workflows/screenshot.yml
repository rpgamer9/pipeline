name: Update Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            wget \
            gnupg \
            libxshmfence-dev \
            libglu1-mesa \
            xvfb \
            fonts-liberation \
            libappindicator3-1 \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgbm1 \
            libgcc1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            xdg-utils

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Install Puppeteer with Chrome
        run: |
          # Install Puppeteer with Chrome
          npm install puppeteer
          # Verify installation
          node -e "console.log(require('puppeteer').executablePath())"

      - name: Take screenshot with debugging
        run: |
          # Debug: List build output
          echo "Build output:"
          ls -la dist/ || echo "dist directory not found"

          # Take screenshot
          node scripts/take-screenshot.js
        env:
          CI: true
          DEBUG: puppeteer:* # Enable Puppeteer debugging

      - name: Verify screenshot
        run: |
          if [ -f screenshots/homepage.png ]; then
            echo "✅ Screenshot created successfully"
            file screenshots/homepage.png
            ls -la screenshots/
          else
            echo "❌ Screenshot not found"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update homepage screenshot [skip ci]"
            git push
          fi
