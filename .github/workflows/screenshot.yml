name: Update Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install express puppeteer --save-dev

      - name: Build the app
        run: npm run build

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libgbm1 \
            libxshmfence1

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Debug - List files
        run: |
          echo "📁 Current directory:"
          pwd
          echo "📁 Contents:"
          ls -la
          echo "📁 Scripts folder:"
          ls -la scripts/ || echo "Scripts folder not found"
          echo "📁 Build folder:"
          ls -la build/ || echo "Build folder not found"

      - name: Debug - Test script syntax
        run: |
          node --check scripts/take-screenshot.js || echo "❌ Script has syntax errors"
          echo "✅ Script syntax check passed"

      - name: Debug - Test browser launch
        run: |
          node -e "
          try {
            console.log('Testing puppeteer require...');
            const puppeteer = require('puppeteer');
            console.log('✅ Puppeteer loaded');

            (async () => {
              try {
                console.log('Attempting browser launch...');
                const browser = await puppeteer.launch({
                  args: ['--no-sandbox'],
                  headless: true
                });
                console.log('✅ Browser launched');
                await browser.close();
                console.log('✅ Browser closed');
              } catch (e) {
                console.error('❌ Browser launch failed:', e.message);
                process.exit(1);
              }
            })();
          } catch (e) {
            console.error('❌ Puppeteer require failed:', e.message);
            process.exit(1);
          }
          "

      - name: Take screenshot with Xvfb
        run: |
          # Start virtual display with logging
          echo "Starting Xvfb..."
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          export DISPLAY=:99

          # Wait for Xvfb
          sleep 3

          # Test Xvfb is running
          echo "Testing Xvfb..."
          xdpyinfo -display :99 > /dev/null 2>&1 && echo "✅ Xvfb running" || echo "❌ Xvfb not running"

          # Run screenshot script with verbose output
          echo "Running screenshot script..."
          node scripts/take-screenshot.js

          # Check exit code
          if [ $? -eq 0 ]; then
            echo "✅ Screenshot script completed successfully"
          else
            echo "❌ Screenshot script failed with exit code $?"
            exit 1
          fi
        env:
          CI: true
          DEBUG: puppeteer:*

      - name: Verify screenshot
        run: |
          if [ -f screenshots/homepage.png ]; then
            echo "✅ Screenshot created successfully"
            ls -la screenshots/
          else
            echo "❌ Screenshot not found"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update homepage screenshot [skip ci]"
            git push
          fi
